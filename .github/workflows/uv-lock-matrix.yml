name: uv.lock test matrix

on:
on:
  push:
    paths:
      - "uv.lock"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/uv-lock-matrix.yml"
  pull_request:
    paths:
      - "uv.lock"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/uv-lock-matrix.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync (frozen)
        run: uv sync -p ${{ matrix.python-version }} --frozen

      - name: Run tests
        run: uv run -p ${{ matrix.python-version }} --no-sync pytest

      - name: Run example
        run: |
          uv run -p ${{ matrix.python-version }} --no-sync python example.py
          rm -f output.wav
